<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Card</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Bootstrap Responsive Card
    </h1>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card shadow">

                <img src="https://picsum.photos/300/200"
                class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Web Development
                    </h5>

                    <p class="card-text">
                        Learn HTML, CSS, JavaScript and Bootstrap to build responsive websites.
                    </p>

                    <a href="#" class="btn btn-primary">
                        Learn More
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card shadow">

                <img src="https://picsum.photos/301/200"
                class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        JavaScript
                    </h5>

                    <p class="card-text">
                        Add interactivity and dynamic features to your webpages.
                    </p>

                    <a href="#" class="btn btn-success">
                        Explore
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card shadow">

                <img src="https://picsum.photos/302/200"
                class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Bootstrap
                    </h5>

                    <p class="card-text">
                        Create beautiful responsive websites quickly using Bootstrap.
                    </p>

                    <a href="#" class="btn btn-danger">
                        Start
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
